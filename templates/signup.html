<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up — Pittsburgh Wiki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* same style as login and map!!! */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D98A;
      --steel: #1C2B3A;
      --cream: #F7F3EC;
      --cream-dark: #EDE7D9;
      --white: #FFFFFF;
      --text-muted: #5A6E80;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
    }

    nav {
      height: 56px;
      background: var(--steel);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 2px solid var(--gold);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      color: var(--gold);
      text-decoration: none;
      font-weight: 700;
    }

    .brand span { color: white; }

    .container {
      height: calc(100vh - 56px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 12px;
      width: 320px;
      border: 1px solid var(--cream-dark);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      margin-bottom: 16px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
    }

    input {
      border: 1.5px solid var(--cream-dark);
      background: var(--cream);
    }

    button {
      background: var(--gold);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover { background: var(--gold-light); }

    .msg {
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>

<body>

<nav>
  <a href="/" class="brand">Pittsburgh <span>Wiki</span></a>
</nav>

<div class="container">
  <div class="card">
    <h2>Sign Up</h2>

    <form id="signupForm">
      <input type="email" id="signupEmail" placeholder="Email" required>
      <input type="password" id="signupPassword" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="/static/js/api.js">
document.getElementById("signupForm").onsubmit = async (e) => {
  e.preventDefault();

  consolve.log("SIGNUP CLICKED");
  
  const res = await signup(
    document.getElementById("signupEmail").value,
    document.getElementById("signupPassword").value
  );

  if (res.message) {
    alert("Signed up successfully!");
    window.location.href = "/login";
  } else {
    msg.textContent = res.error;
  }
};
</script>

</body>
</html>
