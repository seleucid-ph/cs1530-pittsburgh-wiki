<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login — Pittsburgh Wiki</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D98A;
      --steel: #1C2B3A;
      --cream: #F7F3EC;
      --cream-dark: #EDE7D9;
      --text-primary: #1C2B3A;
      --text-muted: #5A6E80;
      --white: #FFFFFF;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); }

    nav {
      height: 56px; background: var(--steel);
      display: flex; align-items: center;
      padding: 0 20px; border-bottom: 2px solid var(--gold);
    }
    .brand { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--gold); text-decoration: none; }
    .brand span { color: var(--white); }

    .container { height: calc(100vh - 56px); display: flex; justify-content: center; align-items: center; }

    .card {
      background: var(--white); padding: 32px; border-radius: 12px;
      width: 320px; border: 1px solid var(--cream-dark);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h2 { font-family: 'Playfair Display', serif; margin-bottom: 18px; }

    input {
      width: 100%; padding: 10px; margin-bottom: 12px;
      border-radius: 8px; border: 1.5px solid var(--cream-dark);
      background: var(--cream); font-family: 'DM Sans', sans-serif;
    }
    input:focus { outline: none; border-color: var(--gold); background: var(--white); }

    button {
      width: 100%; padding: 10px; background: var(--gold);
      border: none; border-radius: 8px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: var(--gold-light); }

    .msg { margin-top: 10px; font-size: 13px; color: red; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="brand">Pittsburgh <span>Wiki</span></a>
</nav>

<div class="container">
  <div class="card">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="email" id="loginemail" placeholder="Email" required>
      <input type="password" id="loginpassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- api.js must load first so login() is defined before the form handler runs -->
<script src="/static/js/api.js"></script>
<script>
document.getElementById("loginForm").onsubmit = async (e) => {
  e.preventDefault();

  const res = await login(
    document.getElementById("loginemail").value,
    document.getElementById("loginpassword").value
  );

  if (res.message) {
    window.location.href = res.redirect || "/home";
  } else {
    document.getElementById("msg").textContent = res.error;
  }
};
</script>

</body>
</html>
